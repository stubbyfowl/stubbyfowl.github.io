  <style>
    @font-face {
      font-family: 'CC Wild Words';
      src: local('CC Wild Words Roman'), local('CCWildWordsRoman'), local('CC Wild Words');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      margin: 0;
      background: #ffffff;
      color: #000;
      font-family: 'CC Wild Words', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 60px 40px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: 
        radial-gradient(circle at 30% 40%, rgba(0,0,0,0.06) 0%, transparent 50%),
        radial-gradient(circle at 70% 70%, rgba(0,0,0,0.08) 0%, transparent 50%),
        radial-gradient(circle at 50% 10%, rgba(0,0,0,0.04) 0%, transparent 50%);
      animation: gradientShift 15s ease infinite;
      pointer-events: none;
      z-index: 0;
    }
    
    @keyframes gradientShift {
      0%, 100% { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(-5%,-5%) rotate(120deg); }
      66%  { transform: translate(5%,5%) rotate(240deg); }
    }
    
    .orb {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(0,0,0,0.12), rgba(0,0,0,0.04));
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 2px solid rgba(0,0,0,0.15);
      pointer-events: none;
      animation: float 20s ease-in-out infinite;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.8), inset 0 -10px 30px rgba(0,0,0,0.05);
      z-index: 1;
    }
    .orb:nth-child(1) { width:280px; height:280px; top:15%;    left:5%;  animation-delay:0s;   }
    .orb:nth-child(2) { width:200px; height:200px; top:50%;    right:10%; animation-delay:-7s;  }
    .orb:nth-child(3) { width:150px; height:150px; bottom:15%; left:50%; animation-delay:-14s; }
