<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>stubbyfowl</title>
  <style>
    @font-face {
      font-family: 'CC Wild Words';
      src: local('CC Wild Words Roman'), local('CCWildWordsRoman'), local('CC Wild Words');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: 'CC Wild Words', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #ffffff;
      color: #000;
      text-align: center;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0,0,0,0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0,0,0,0.08) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(0,0,0,0.04) 0%, transparent 50%);
      animation: gradientShift 15s ease infinite;
      pointer-events: none;
    }
    
    @keyframes gradientShift {
      0%, 100% { transform: translate(0,0) rotate(0deg); }
      33%  { transform: translate(-5%,-5%) rotate(120deg); }
      66%  { transform: translate(5%,5%) rotate(240deg); }
    }
    
    header {
      padding: 60px 0 40px;
      font-size: 72px;
      font-weight: 700;
      letter-spacing: 12px;
      background: linear-gradient(135deg, #000 0%, #333 50%, #000 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: lowercase;
      position: relative;
      animation: fadeInDown 1s ease;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }
    
    @keyframes fadeInDown {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    
    nav {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 24px;
      animation: fadeInUp 1s ease 0.2s both;
    }
    
    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    
    nav a { text-decoration: none; }
    
    nav button {
      background: rgba(0,0,0,0.08);
